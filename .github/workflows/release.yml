name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Build agent binaries for all platforms ───
  build-agent:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: meshezia-agent-linux-x86_64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: meshezia-agent-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: meshezia-agent-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: meshezia-agent-darwin-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build agent binary
        run: |
          bun build --compile \
            --target=${{ matrix.target }} \
            packages/agent/src/index.ts \
            --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ─── Build and push Docker image (server + frontend) ───
  build-docker:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU (for arm64)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Create GitHub Release with binaries ───
  release:
    needs: [build-agent, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download agent artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: meshezia-agent-*

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/meshezia-agent-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
            cd release && sha256sum "$name" >> checksums.txt && cd ..
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Docker Control Plane

            ```bash
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            **Digest:** `${{ needs.build-docker.outputs.digest }}`

            ```bash
            # Pin by digest
            docker pull ghcr.io/${{ env.IMAGE_NAME }}@${{ needs.build-docker.outputs.digest }}
            ```

            ## Agent Binaries

            Download the binary for your platform from Assets below.

            ```bash
            # Linux x86_64
            curl -Lo meshezia-agent https://github.com/${{ env.IMAGE_NAME }}/releases/download/${{ github.ref_name }}/meshezia-agent-linux-x86_64
            chmod +x meshezia-agent
            ```
          files: |
            release/meshezia-agent-*
            release/checksums.txt
